<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 대시보드</title>
<style>
:root{color-scheme:light}*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#F0F4FF;color:#1A2332;min-height:100vh}
.header{background:white;border-bottom:1px solid #E4E9F4;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:16px;font-weight:700}.date{font-size:11px;color:#8A9BB0;margin-top:2px}
.stats{display:flex;gap:20px}.stat{text-align:center}.n{font-size:22px;font-weight:800}.l{font-size:10px;color:#8A9BB0}
.green{color:#2E7D32}.blue{color:#1565C0}.gray{color:#8A9BB0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:20px 24px}
.card{background:white;border-radius:16px;border:2px solid #E8ECF4;cursor:pointer;transition:all .2s;overflow:hidden}
.card:hover{border-color:#7986CB;box-shadow:0 6px 20px rgba(0,0,0,.1);transform:translateY(-2px)}
.card.is-active{border-color:#5C6BC0}
.card-top{padding:18px 20px 12px}
.card-row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.ptitle{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}.pi{font-size:22px}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px}
.badge.active{background:#E8F5E9;color:#2E7D32}.badge.pending{background:#F3E5F5;color:#7B1FA2}
.desc{font-size:12px;color:#8A9BB0;margin-bottom:10px}
.pr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bb{flex:1;height:8px;background:#EEF0F8;border-radius:99px;overflow:hidden}
.bf{height:100%;border-radius:99px;background:linear-gradient(90deg,#5C6BC0,#42A5F5)}
.pct{font-size:13px;font-weight:800;color:#5C6BC0;min-width:36px;text-align:right}
.ts{display:flex;gap:10px;font-size:11px;color:#5A6A80}.ti{display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%}.dd{background:#2E7D32}.dp{background:#1565C0}.dw{background:#D0D5E8}
.cf{padding:8px 20px 14px;display:flex;gap:6px}
.wf{font-size:10px;background:#EDE7F6;color:#512DA8;padding:2px 8px;border-radius:99px;font-weight:600}
.upd{text-align:center;font-size:11px;color:#B0BCC8;padding:8px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;display:none}.ov.show{display:block}
.pnl{position:fixed;right:0;top:0;bottom:0;width:400px;background:white;border-left:1px solid #E4E9F4;z-index:100;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s ease}
.pnl.open{transform:translateX(0)}
.ph{padding:18px 20px;border-bottom:1px solid #EEF0F8;display:flex;align-items:flex-start;gap:12px}
.phi{font-size:30px}.phi2{flex:1}.phi2 h2{font-size:15px;font-weight:700}.phi2 .sub{font-size:11px;color:#8A9BB0;margin-top:2px}
.xbtn{background:#F0F4FF;border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pp{padding:14px 20px;border-bottom:1px solid #EEF0F8}.pb{flex:1;overflow-y:auto}
.sec{padding:14px 20px;border-bottom:1px solid #F5F7FF}
.sl{font-size:10px;font-weight:700;color:#8A9BB0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.tr{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #F8F9FF}.tr:last-child{border-bottom:none}
.tc{width:18px;height:18px;border-radius:50%;border:2px solid #D0D5E8;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
.tc.dc{background:#2E7D32;border-color:#2E7D32;color:white}.tc.pc{background:#1565C0;border-color:#1565C0;color:white}
.tt{flex:1}.ttt{font-size:13px;font-weight:500}.ttt.done{color:#9AA5B4;text-decoration:line-through}
.td{font-size:11px;color:#B0BCC8;margin-top:2px}
.tb{font-size:10px;padding:2px 8px;border-radius:99px;white-space:nowrap;align-self:center}
.tb-done{background:#E8F5E9;color:#2E7D32}.tb-prog{background:#E3F2FD;color:#1565C0}.tb-pend{background:#F5F7FF;color:#8A9BB0}
.le{background:#F8F9FF;border-radius:10px;padding:12px 14px;margin-bottom:8px;border-left:3px solid #7986CB}
.ld{font-size:11px;font-weight:700;color:#5C6BC0;margin-bottom:5px}.lt{font-size:12px;color:#4A5568;line-height:1.6}
.lm{margin-top:8px;font-size:12px;color:#2E7D32;background:#E8F5E9;border-radius:6px;padding:6px 10px}
.el{font-size:12px;color:#B0BCC8}
@media(max-width:600px){.grid{grid-template-columns:1fr}.pnl{width:100%}}
</style>
</head>
<body>
<div class="header">
<div><h1>📊 프로젝트 대시보드</h1><div class="date" id="dl"></div></div>
<div class="stats">
<div class="stat"><div class="n blue" id="tn">—</div><div class="l">전체</div></div>
<div class="stat"><div class="n green" id="an">—</div><div class="l">진행중</div></div>
<div class="stat"><div class="n gray" id="pn">—</div><div class="l">대기</div></div>
</div></div>
<div class="grid" id="grid"></div>
<div class="upd" id="upd"></div>
<div class="ov" id="ov" onclick="cp()"></div>
<div class="pnl" id="pnl">
<div class="ph" id="ph"></div>
<div class="pp" id="pp"></div>
<div class="pb" id="pb"></div>
</div>
<script>
const B="https://raw.githubusercontent.com/gaunten-coder/project-dashboard/main";
const IDS=["storyboard","camera-metadata","desktop-cleanup","memo-cleanup"];
function pg(p){const l=p.daily_logs?.[p.daily_logs.length-1];if(l?.progress!=null)return l.progress;const d=p.tasks.filter(t=>t.status==="done").length;return Math.round(d/p.tasks.length*100)}
function sl(s){return{active:"진행 중",pending:"대기",done:"완료"}[s]||s}
async function load(){return(await Promise.all(IDS.map(id=>fetch(`${B}/${id}/project.json?t=${Date.now()}`).then(r=>r.json()).catch(()=>null)))).filter(Boolean)}
function render(ps){let a=0,pn=0;
document.getElementById("grid").innerHTML=ps.map(p=>{
const pr=pg(p),tc={d:p.tasks.filter(t=>t.status==="done").length,i:p.tasks.filter(t=>t.status==="in_progress").length,w:p.tasks.filter(t=>t.status==="pending").length};
if(p.status==="active")a++;if(p.status==="pending")pn++;
return`<div class="card ${p.status==="active"?"is-active":""}" onclick='op(${JSON.stringify(p)})'>
<div class="card-top">
<div class="card-row1"><div class="ptitle"><span class="pi">${p.icon}</span>${p.name}</div><span class="badge ${p.status}">${sl(p.status)}</span></div>
<div class="desc">${p.description}</div>
<div class="pr"><div class="bb"><div class="bf" style="width:${pr}%"></div></div><span class="pct">${pr}%</span></div>
<div class="ts"><div class="ti"><div class="dot dd"></div>완료 ${tc.d}</div><div class="ti"><div class="dot dp"></div>진행 ${tc.i}</div><div class="ti"><div class="dot dw"></div>대기 ${tc.w}</div></div>
</div><div class="cf">${p.workflow.map(w=>`<span class="wf">${w}</span>`).join("")}</div></div>`}).join("");
document.getElementById("tn").textContent=ps.length;document.getElementById("an").textContent=a;document.getElementById("pn").textContent=pn;
document.getElementById("upd").textContent=`마지막 업데이트: ${new Date().toLocaleString("ko-KR")}`;
}
function op(p){const pr=pg(p);
document.getElementById("ph").innerHTML=`<span class="phi">${p.icon}</span><div class="phi2"><h2>${p.name}</h2><div class="sub">${p.description}</div></div><button class="xbtn" onclick="cp()">✕</button>`;
document.getElementById("pp").innerHTML=`<div class="sl">진행률</div><div style="display:flex;align-items:center;gap:10px"><div class="bb" style="flex:1"><div class="bf" style="width:${pr}%"></div></div><span class="pct">${pr}%</span></div>`;
const th=p.tasks.map(t=>{const dc=t.status==="done",pc=t.status==="in_progress";return`<div class="tr"><div class="tc ${dc?"dc":pc?"pc":""}">${dc?"✓":pc?"●":""}</div><div class="tt"><div class="ttt ${dc?"done":""}">${t.title}</div>${t.completedAt?`<div class="td">완료: ${t.completedAt}</div>`:t.startedAt?`<div class="td">시작: ${t.startedAt}</div>`:""}</div><span class="tb ${dc?"tb-done":pc?"tb-prog":"tb-pend"}">${dc?"완료":pc?"진행 중":"대기"}</span></div>`}).join("");
const lh=p.daily_logs?.length?[...p.daily_logs].reverse().map(l=>`<div class="le"><div class="ld">📅 ${l.date}</div><div class="lt">${l.summary}</div>${l.tomorrow?`<div class="lm">🔜 내일: ${l.tomorrow}</div>`:""}</div>`).join(""):`<div class="el">아직 기록 없음</div>`;
document.getElementById("pb").innerHTML=`<div class="sec"><div class="sl">작업 목록</div>${th}</div><div class="sec"><div class="sl">일일 기록</div>${lh}</div>`;
document.getElementById("pnl").classList.add("open");document.getElementById("ov").classList.add("show");}
function cp(){document.getElementById("pnl").classList.remove("open");document.getElementById("ov").classList.remove("show")}
document.getElementById("dl").textContent=new Date().toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
load().then(render);
</script>
</body>
</html>
